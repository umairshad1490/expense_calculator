<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <div class="container">
            <div class="auth-box">
                <h1>💰 Expense Tracker</h1>
                <div id="loginForm" class="form-container active">
                    <h2>Login</h2>
                    <form id="loginFormElement">
                        <input type="text" id="loginUsername" placeholder="Username" required>
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <button type="submit" class="btn btn-primary">Login</button>
                    </form>
                    <p class="switch-auth">Don't have an account? <a href="#" id="showRegister">Register</a></p>
                </div>
                <div id="registerForm" class="form-container">
                    <h2>Register</h2>
                    <form id="registerFormElement">
                        <input type="text" id="registerUsername" placeholder="Username" required minlength="3">
                        <input type="password" id="registerPassword" placeholder="Password" required minlength="6">
                        <input type="password" id="registerConfirmPassword" placeholder="Confirm Password" required>
                        <button type="submit" class="btn btn-primary">Register</button>
                    </form>
                    <p class="switch-auth">Already have an account? <a href="#" id="showLogin">Login</a></p>
                </div>
                <div id="authMessage" class="message"></div>
            </div>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboardScreen" class="screen">
        <nav class="navbar">
            <div class="nav-content">
                <h1>💰 Expense Tracker</h1>
                <div class="nav-right">
                    <span id="currentUser" class="user-info"></span>
                    <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                </div>
            </div>
        </nav>

        <div class="container">
            <!-- Month Selector -->
            <div class="month-selector">
                <button id="prevMonth" class="btn btn-icon">◀</button>
                <h2 id="currentMonth"></h2>
                <button id="nextMonth" class="btn btn-icon">▶</button>
            </div>

            <!-- Summary Cards -->
            <div class="summary-cards">
                <div class="card summary-card income">
                    <h3>Total Income</h3>
                    <p class="amount" id="totalIncome">₨0.00</p>
                </div>
                <div class="card summary-card expense">
                    <h3>Total Expenses</h3>
                    <p class="amount" id="totalExpense">₨0.00</p>
                </div>
                <div class="card summary-card balance">
                    <h3>Balance</h3>
                    <p class="amount" id="balance">₨0.00</p>
                </div>
            </div>

            <!-- Add Transaction Form -->
            <div class="card add-transaction">
                <h3>Add Transaction</h3>
                <form id="transactionForm">
                    <div class="form-row">
                        <select id="transactionType" required>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                        <input type="text" id="transactionDescription" placeholder="Description" required>
                    </div>
                    <div class="form-row">
                        <input type="number" id="transactionAmount" placeholder="Amount" step="0.01" required min="0.01">
                        <select id="transactionCategory" required>
                            <option value="">Select Category</option>
                            <optgroup label="Expense Categories">
                                <option value="Food">🍔 Food</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Bills">💡 Bills</option>
                                <option value="Entertainment">🎬 Entertainment</option>
                                <option value="Health">⚕️ Health</option>
                                <option value="Education">📚 Education</option>
                                <option value="Other">📦 Other</option>
                            </optgroup>
                            <optgroup label="Income Categories">
                                <option value="Salary">💼 Salary</option>
                                <option value="Freelance">💻 Freelance</option>
                                <option value="Investment">📈 Investment</option>
                                <option value="Gift">🎁 Gift</option>
                                <option value="Other Income">💰 Other Income</option>
                            </optgroup>
                        </select>
                        <input type="date" id="transactionDate" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Transaction</button>
                </form>
            </div>

            <!-- Transactions List -->
            <div class="card transactions-list">
                <div class="list-header">
                    <h3>Transactions</h3>
                    <div class="filter-controls">
                        <select id="filterType">
                            <option value="all">All</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                        <select id="filterCategory">
                            <option value="all">All Categories</option>
                        </select>
                    </div>
                </div>
                <div id="transactionsList" class="transactions">
                    <p class="no-data">No transactions yet. Add your first transaction above!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
